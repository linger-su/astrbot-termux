name: Build AstrBot APP APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup NDK and Build Tools
        run: |
          sdkmanager "ndk;26.1.10909125" "build-tools;34.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "BUILD_TOOLS=$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_ENV

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: |
          export TERMUX_APP_VERSION_NAME="0.0.1"
          export TERMUX_APK_VERSION_TAG="v0.0.1"
          ./gradlew assembleRelease
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      - name: Sign APK
        run: |
          # Decode keystore
          echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 -d > /tmp/keystore.jks

          # Find the unsigned APK
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)

          # Align APK
          $BUILD_TOOLS/zipalign -v 4 "$APK_PATH" /tmp/aligned.apk

          # Sign APK
          $BUILD_TOOLS/apksigner sign --ks /tmp/keystore.jks \
            --ks-key-alias "${{ secrets.SIGNING_ALIAS }}" \
            --ks-pass pass:"${{ secrets.SIGNING_STORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.SIGNING_KEY_PASSWORD }}" \
            --out /tmp/signed.apk \
            /tmp/aligned.apk

          # Move to final location
          mv /tmp/signed.apk AstrBot-APP-v0.0.1.apk

          # Cleanup
          rm -f /tmp/keystore.jks /tmp/aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AstrBot-APP
          path: AstrBot-APP-v0.0.1.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: AstrBot-APP

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: AstrBot-APP-v0.0.1.apk
          body: |
            ## AstrBot APP v0.0.1

            基于 Termux 的 AstrBot + NapCatQQ 一键部署方案。

            ### 下载
            下载 `AstrBot-APP-v0.0.1.apk` 安装到 Android 设备。

            ### 使用说明
            1. 安装 APK 并打开
            2. 首次启动自动初始化（约 5-15 分钟）
            3. 完成后访问 WebUI 配置：
               - NapCat WebUI: http://localhost:6099（扫码登录 QQ）
               - AstrBot WebUI: http://localhost:6185（配置机器人）

            ### 详细文档
            请参考 [README](https://github.com/linger-su/astrbot-termux#readme)
          draft: false
          prerelease: false
